services:
  - type: web
    name: cub-scouts-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cub-scouts-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: cub-scouts-db
    plan: free
